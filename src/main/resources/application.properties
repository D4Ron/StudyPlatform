# Application
spring.application.name=study-platform
server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/studyplatform}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT
app.jwt.secret=${JWT_SECRET:change-me-in-production}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

# Storage
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.local.path=${APP_STORAGE_LOCAL_PATH:./uploads}

# AWS S3
app.aws.s3.bucket=${AWS_S3_BUCKET:studyplatform-documents}
app.aws.s3.region=${AWS_REGION:eu-west-1}
app.aws.access-key=${AWS_ACCESS_KEY:}
app.aws.secret-key=${AWS_SECRET_KEY:}

# Claude API
app.claude.api-key=${CLAUDE_API_KEY:}
app.claude.model=claude-sonnet-4-20250514
app.claude.max-tokens=4096

# Google Drive
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/drive/callback}

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.default-produces-media-type=application/json