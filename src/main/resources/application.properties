# Application
spring.application.name=study-platform

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/studyplatform
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Server
server.port=8080

# JWT
app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-please}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000

# AWS S3 (used later)
app.aws.s3.bucket=${AWS_S3_BUCKET:studyplatform-documents}
app.aws.s3.region=${AWS_REGION:eu-west-1}

# Claude API (used later)
app.claude.api-key=${CLAUDE_API_KEY:}
app.claude.model=claude-sonnet-4-20250514
app.claude.max-tokens=4096


# Storage
app.storage.type=local
app.storage.local.path=./uploads

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.default-produces-media-type=application/json